name: Test

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]

jobs:
  build-debian:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check if rpi/debian changed
        id: changes
        run: |
          git fetch origin main
          if git diff --name-only HEAD origin/main | grep '^rpi/debian/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run step only if rpi/debian changed
        if: steps.changes.outputs.changed == 'true'
        run: echo "Running this step because rpi/debian changed"

      - name: Set up Docker Buildx
        if: steps.changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Your GitHub username
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./rpi/debian
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-debian:latest
            ghcr.io/${{ github.repository }}-debian:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build RPI image
        if: steps.changes.outputs.changed == 'true'
        run: ./build-docker.sh
        working-directory: rpi/debian

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          name: debian-build
          path: |
            ./rpi/debian/deploy/*.zip

  build-alpine:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check if rpi/alpine changed *rpi-alpine-changed
        id: changes
        run: |
          git fetch origin main
          if git diff --name-only HEAD origin/main | grep '^rpi/alpine/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            mkdir -p rpi/alpine/deploy
          fi

      - name: Set up Docker Buildx
        if: steps.changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Your GitHub username
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./rpi/alpine
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-alpine:latest
            ghcr.io/${{ github.repository }}-alpine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build RPI image
        if: steps.changes.outputs.changed == 'true'
        run: ./build-docker.sh
        working-directory: rpi/alpine

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          name: alpine-build
          path: |
            ./rpi/alpine/deploy/*
