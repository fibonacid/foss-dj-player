name: Docker Image CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pi-gen:
    runs-on: ubuntu-24.04-arm 
    steps:
    - uses: actions/checkout@v4
    - name: Build RPI image 
      run: ./build-docker.sh
      working-directory: pi-gen
    - uses: actions/upload-artifact@v4
      with:
        name: foss-dj-player-image
        path: pi-gen/deploy/*.zip
