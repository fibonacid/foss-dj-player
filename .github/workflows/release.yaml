name: Publish Release

on:
  push:
    branches:
      - main
    tags:
      - "*"
jobs:
  build-debian:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Run step only if rpi/debian changed
        run: echo "Running this step because rpi/debian changed"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Your GitHub username
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./rpi/debian
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-debian:latest
            ghcr.io/${{ github.repository }}-debian:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build RPI image
        run: ./build-docker.sh
        working-directory: rpi/debian

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-build
          path: |
            ./rpi/debian/deploy/*.zip

  build-alpine:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Your GitHub username
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./rpi/alpine
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-alpine:latest
            ghcr.io/${{ github.repository }}-alpine:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build RPI image
        run: ./build-docker.sh
        working-directory: rpi/alpine

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpine-build
          path: |
            ./rpi/alpine/deploy/*

  release:
    needs: ["build-debian", "build-alpine"]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Download debian artifacts
        uses: actions/download-artifact@v4
        with:
          name: debian-build
          path: debian

      - name: Download alpine artifacts
        uses: actions/download-artifact@v4
        with:
          name: alpine-build
          path: alpine

      - name: Prepare Assets
        run: |
          mkdir release
          find .
          mv ./debian/*.zip ./release/foss-dj-player-${{ github.ref_name }}-debian.zip
          mv ./alpine/*.zip ./release/foss-dj-player-${{ github.ref_name }}-alpine.zip
          find release

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: CHANGELOG.md
          files: |
            ./release/*
