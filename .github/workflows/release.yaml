name: Publish Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-24.04-arm 
    steps:
    - uses: actions/checkout@v4

    - name: Build RPI image 
      run: ./build-docker.sh
      working-directory: pi-gen

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        body_path: CHANGELOG.md

    - name: Upload RPI image
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./pi-gen/deploy/foss-dj-player.zip
        asset_name: foss-dj-player-${{ github.ref }}.zip
        asset_content_type: application/zip

    - name: Upload RPI image info
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./pi-gen/deploy/foss-dj-player.info
        asset_name: foss-dj-player-${{ github.ref }}.info
        asset_content_type: text/plain
